services:
  postgres:
    image: postgres:16-alpine
    container_name: keyan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keyan
      POSTGRES_USER: keyan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Keyan@2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyan -d keyan"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: keyan-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://keyan:${DB_PASSWORD:-Keyan@2026}@postgres:5432/keyan
      JWT_SECRET: ${JWT_SECRET:-keyan-platform-jwt-secret-change-in-prod}
      PORT: 3000
      NODE_ENV: production
      SEED_ON_START: "true"
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: keyan-frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: keyan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
